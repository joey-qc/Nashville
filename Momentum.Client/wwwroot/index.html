<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="manifest" href="brand/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="brand/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="favicon.png" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="brand/icon-180x180.png" />
    <link href="Momentum.Client.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/momentum-theme.css"/>
    <link rel="stylesheet" href="css/auth-pages.css"/>
    <script type="importmap"></script>
    <style>
        .m-splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #050D1B;
            font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
            padding: 1rem;
            box-sizing: border-box;
        }

        .m-splash__title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            color: #76E04A;
            margin: 0 0 0.625rem;
            letter-spacing: 0.04em;
            animation: m-fadein 0.6s ease-out both;
        }

        .m-splash__tagline {
            font-size: clamp(0.875rem, 3vw, 1.0625rem);
            color: #8BA0B8;
            font-weight: 300;
            margin: 0 0 2.75rem;
            text-align: center;
            animation: m-fadein 0.6s ease-out 0.2s both;
        }

        .m-splash__track {
            position: relative;
            width: min(400px, 78vw);
            height: 4px;
            background-color: #0E2240;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1.25rem;
            animation: m-fadein 0.6s ease-out 0.3s both;
        }

        .m-splash__bar {
            position: absolute;
            top: 0;
            height: 100%;
            background-color: #76E04A;
            border-radius: 4px;
            animation: m-progress 1.8s ease-in-out infinite;
        }

        .m-splash__status {
            font-size: 0.8125rem;
            color: #4A6080;
            letter-spacing: 0.025em;
            animation: m-fadein 0.6s ease-out 0.4s both;
        }

        @keyframes m-fadein {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes m-progress {
            0%   { left: -40%; width: 40%; }
            45%  { left: 25%; width: 65%; }
            75%  { left: 95%; width: 40%; }
            100% { left: 115%; width: 40%; }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="m-splash">
            <span class="m-splash__title">Momentum</span>
            <span class="m-splash__tagline">Building better habits, one day at a time.</span>
            <div class="m-splash__track">
                <div class="m-splash__bar"></div>
            </div>
            <span class="m-splash__status" id="m-status">Initializing...</span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        (function () {
            var messages = ['Initializing...', 'Loading your data...', 'Almost ready...'];
            var idx = 0;
            var timer = setInterval(function () {
                var el = document.getElementById('m-status');
                if (!el) { clearInterval(timer); return; }
                idx = (idx + 1) % messages.length;
                el.textContent = messages[idx];
            }, 1500);
        }());
    </script>
    <script src="js/richNotesEditor.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
